<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro&display=swap" rel="stylesheet" />
    <title>Maracaloca</title>
    <style>
        @font-face {
            font-family: 'Avalon';
            src: url('Avalon.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: Avalon, Consolas, 'Courier New', monospace;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('images/about.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            filter: grayscale(100%);
        }

        .capa-blanca {
            background-color: white;
            min-height: 100vh;
            padding: 40px;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            position: relative;
            top: 1200px;
            width: 100%;
            z-index: 10;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .mosaico {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }

        .item {
            flex: 1 1 calc(33.333% - 10px);
            max-width: calc(33.333% - 10px);
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(100%);
            transition: filter 0.4s ease;
        }

        .item:hover img,
        .item:active img {
            filter: grayscale(0%);
        }

        .item.hidden {
            display: none;
        }

        .capa-texto {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.2);
        }

        .capa-texto h2 {
            font-size: 5rem;
            font-weight: bold;
            color: whitesmoke;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.2s, transform 0.2s;
            font-family: Avalon, Consolas, 'Courier New', monospace;
        }

        .filtros {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filtros button {
            all: unset;
            font-family: 'Avalon', Consolas, monospace;
            font-size: 1.2rem;
            color: black;
            cursor: pointer;
            position: relative;
            padding-bottom: 4px;
            transition: color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .filtros button::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: 0;
            height: 2px;
            width: calc(100% + 2px);
            background-color: black;
            transform: translateX(-50%) scaleX(0);
            transform-origin: center;
            transition: transform 0.3s ease;
        }

        .filtros button.activo::after {
            width: 100%;
            transform: translateX(-50%) scaleX(1);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #111;
            max-width: 1350px;
            width: 90%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 3px solid whitesmoke;
            box-sizing: border-box;
            position: relative;
            z-index: 1010;
        }

        .modal-video {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }

        .modal-video iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-text {
            padding: 15px 20px;
            color: whitesmoke;
            background: #222;
        }

        .modal-text p {
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: transparent;
            border: none;
            font-size: 2rem;
            color: whitesmoke;
            cursor: pointer;
            font-family: monospace;
            z-index: 1020;
            -webkit-tap-highlight-color: transparent;
        }

        @media (max-width: 1000px) {
            .item {
                flex: 1 1 calc(50% - 10px);
                max-width: calc(50% - 10px);
            }
        }

        @media (max-width: 700px) {
            .item {
                flex: 1 1 100%;
                max-width: 100%;
            }

            .modal-content {
                max-width: 100%;
                max-height: 90vh;
                border-width: 2px;
            }

            .capa-texto h2 {
                font-size: 2rem;
                letter-spacing: 0.2rem;
            }
        }

        .capa-texto.hidden {
            visibility: hidden;
        }

        .about-overlay {
            display: flex;
            justify-content: flex-start;
            padding: 100px 60px;
            position: absolute;
            z-index: 8;
            background-color: transparent;
            width: 100%;
            background-color: #000;
        }

        .about-content {
            max-width: 460px;
            color: whitesmoke;
            font-family: Avalon, Consolas, 'Courier New', monospace;
            text-align: left;
            padding-bottom: 100px;
        }

        .about-content h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-family: Avalon, Consolas, 'Courier New', monospace;
        }

        .about-content p {
            font-size: 1.2rem;
            line-height: 1.6;
            font-family: Avalon, Consolas, 'Courier New', monospace;
        }

        body {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        .telefono {
            color: whitesmoke !important;
            text-decoration: none !important;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
            font-family: Avalon, Consolas, 'Courier New', monospace;
        }

        a[href^="tel:"] {
            color: whitesmoke !important;
            text-decoration: none !important;
            -webkit-text-fill-color: whitesmoke !important;
        }

        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            background-image:
                repeating-linear-gradient(to bottom,
                    rgba(255, 255, 255, 0.1),
                    rgba(255, 255, 255, 0.1) 2px,
                    rgba(0, 0, 0, 0.1) 2px,
                    rgba(0, 0, 0, 0.1) 5px),
                repeating-linear-gradient(to right,
                    rgba(255, 255, 255, 0.025),
                    rgba(255, 255, 255, 0.025) 1px,
                    transparent 1px,
                    transparent 2.5px);
            animation: flicker 1s infinite;
            mix-blend-mode: screen;
            filter: brightness(1.2) contrast(1.3);
            opacity: 0.35;
        }

        .hamburguesa {
            position: fixed;
            top: 22px;
            right: 15px;
            z-index: 3000;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 30px;
            height: 30px;
            gap: 5px;
            transition: opacity 0.3s ease, transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .hamburguesa span {
            width: 26px;
            height: 3px;
            background-color: white;
            display: block;
            transition: all 0.3s ease;
            border-radius: 2px;
            transform-origin: center;
        }

        /* Hamburguesa en fondo blanco */
        .hamburguesa.fondo-blanco span {
            background-color: #ccc;
        }

        /* Hover effect para fondo blanco */
        .hamburguesa.fondo-blanco:hover span {
            background-color: #999;
        }

        /* Animación cuando el menú está activo - transformación a aspa (X) rotativa */
        .hamburguesa.activo {
            animation: rotateX 0.6s ease-in-out forwards;
        }

        .hamburguesa.activo span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .hamburguesa.activo span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }

        .hamburguesa.activo span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* Keyframes para la rotación del aspa */
        @keyframes rotateX {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(180deg);
            }
        }

        /* Animación de vuelta cuando se desactiva */
        .hamburguesa:not(.activo) {
            animation: rotateBack 0.6s ease-in-out forwards;
        }

        @keyframes rotateBack {
            0% {
                transform: rotate(180deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .menu-horizontal {
            position: fixed;
            top: 0px;
            right: 15px;
            /* Alineado con la hamburguesa */
            height: 50px;
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 37px 20px;
            background: rgba(0, 0, 0, 0);
            z-index: 2999;
            transform: translateX(100%);
            /* Ajustado para que salga completamente fuera */
            transition: transform 0.4s ease-in-out;
            border-bottom-left-radius: 10px;
            backdrop-filter: blur(4px);
            transform-origin: right center;
            /* Origen de transformación alineado a la derecha */
        }

        /* Menú horizontal cuando está activo */
        .menu-horizontal.activo {
            transform: translateX(0);
        }

        .menu-horizontal a {
            color: white;
            text-decoration: none;
            font-family: Avalon, Consolas, monospace;
            font-size: 1.1rem;
            white-space: nowrap;
            transition: color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        /* Keyframes para la rotación del aspa */
        @keyframes rotateX {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(180deg);
            }
        }

        /* Animación de vuelta cuando se desactiva */
        .hamburguesa:not(.activo) {
            animation: rotateBack 0.6s ease-in-out forwards;
        }

        @keyframes rotateBack {
            0% {
                transform: rotate(180deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .menu-horizontal {
            position: fixed;
            top: 0;
            right: 55px;
            height: 50px;
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 37px 20px;
            background: rgba(0, 0, 0, 0);
            z-index: 2999;
            transform: translateX(150%);
            transition: transform 0.4s ease-in-out;
            border-bottom-left-radius: 10px;
            backdrop-filter: blur(4px);
        }

        /* Menú horizontal cuando está activo */
        .menu-horizontal.activo {
            transform: translateX(0);
        }

        .menu-horizontal a {
            color: white;
            text-decoration: none;
            font-family: Avalon, Consolas, monospace;
            font-size: 1.1rem;
            white-space: nowrap;
            transition: color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        /* Específico para iOS */
        @supports (-webkit-touch-callout: none) {
            body {
                -webkit-user-select: none;
                user-select: none;
            }

            .item {
                -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
            }
        }

        /* Optimización para dispositivos móviles */
        @media (max-width: 768px) {
            .capa-blanca {
                padding: 20px;
            }

            .about-overlay {
                padding: 50px 30px;
            }

            .about-content {
                max-width: 100%;
            }
        }
    </style>
</head>
