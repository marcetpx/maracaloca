<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro&display=swap" rel="stylesheet" />
    <title>Maracaloca</title>
    <style>
        @font-face {
            font-family: 'Avalon';
            src: url('Avalon.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: Avalon, Consolas, 'Courier New', monospace;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('images/about.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            filter: grayscale(100%);
        }

        .capa-blanca {
            background-color: white;
            min-height: 100vh;
            padding: 40px;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            position: relative;
            top: 1200px;
            width: 100%;
            z-index: 10;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .mosaico {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }

        .item {
            flex: 1 1 calc(33.333% - 10px);
            max-width: calc(33.333% - 10px);
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(100%);
            transition: filter 0.4s ease;
        }

        .item:hover img,
        .item:active img {
            filter: grayscale(0%);
        }

        .item.hidden {
            display: none;
        }

        .capa-texto {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.2);
        }

        .capa-texto h2 {
            font-size: 5rem;
            font-weight: bold;
            color: whitesmoke;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.2s, transform 0.2s;
            font-family: Avalon, Consolas, 'Courier New', monospace;
        }

        .filtros {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filtros button {
            all: unset;
            font-family: 'Avalon', Consolas, monospace;
            font-size: 1.2rem;
            color: black;
            cursor: pointer;
            position: relative;
            padding-bottom: 4px;
            transition: color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .filtros button::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: 0;
            height: 2px;
            width: calc(100% + 2px);
            background-color: black;
            transform: translateX(-50%) scaleX(0);
            transform-origin: center;
            transition: transform 0.3s ease;
        }

        .filtros button.activo::after {
            width: 100%;
            transform: translateX(-50%) scaleX(1);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #111;
            max-width: 1350px;
            width: 90%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 3px solid whitesmoke;
            box-sizing: border-box;
            position: relative;
            z-index: 1010;
        }

        .modal-video {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }

        .modal-video iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-text {
            padding: 15px 20px;
            color: whitesmoke;
            background: #222;
        }

        .modal-text p {
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: transparent;
            border: none;
            font-size: 2rem;
            color: whitesmoke;
            cursor: pointer;
            font-family: monospace;
            z-index: 1020;
            -webkit-tap-highlight-color: transparent;
        }

        @media (max-width: 1000px) {
            .item {
                flex: 1 1 calc(50% - 10px);
                max-width: calc(50% - 10px);
            }
        }

        @media (max-width: 700px) {
            .item {
                flex: 1 1 100%;
                max-width: 100%;
            }

            .modal-content {
                max-width: 100%;
                max-height: 90vh;
                border-width: 2px;
            }

            .capa-texto h2 {
                font-size: 2rem;
                letter-spacing: 0.2rem;
            }
        }

        .capa-texto.hidden {
            visibility: hidden;
        }

        .about-overlay {
            display: flex;
            justify-content: flex-start;
            padding: 100px 60px;
            position: absolute;
            z-index: 8;
            background-color: transparent;
            width: 100%;
            background-color: #000;
        }

        .about-content {
            max-width: 460px;
            color: whitesmoke;
            font-family: Avalon, Consolas, 'Courier New', monospace;
            text-align: left;
            padding-bottom: 100px;
        }

        .about-content h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-family: Avalon, Consolas, 'Courier New', monospace;
        }

        .about-content p {
            font-size: 1.2rem;
            line-height: 1.6;
            font-family: Avalon, Consolas, 'Courier New', monospace;
        }

        body {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        .telefono {
            color: whitesmoke !important;
            text-decoration: none !important;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
            font-family: Avalon, Consolas, 'Courier New', monospace;
        }

        a[href^="tel:"] {
            color: whitesmoke !important;
            text-decoration: none !important;
            -webkit-text-fill-color: whitesmoke !important;
        }

        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            background-image:
                repeating-linear-gradient(to bottom,
                    rgba(255, 255, 255, 0.1),
                    rgba(255, 255, 255, 0.1) 2px,
                    rgba(0, 0, 0, 0.1) 2px,
                    rgba(0, 0, 0, 0.1) 5px),
                repeating-linear-gradient(to right,
                    rgba(255, 255, 255, 0.025),
                    rgba(255, 255, 255, 0.025) 1px,
                    transparent 1px,
                    transparent 2.5px);
            animation: flicker 1s infinite;
            mix-blend-mode: screen;
            filter: brightness(1.2) contrast(1.3);
            opacity: 0.35;
        }

        .hamburguesa {
            position: fixed;
            top: 22px;
            right: 15px;
            z-index: 3000;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 30px;
            height: 30px;
            gap: 5px;
            transition: opacity 0.3s ease, transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .hamburguesa span {
            width: 26px;
            height: 3px;
            background-color: white;
            display: block;
            transition: all 0.3s ease;
            border-radius: 2px;
            transform-origin: center;
        }

        /* Hamburguesa en fondo blanco */
        .hamburguesa.fondo-blanco span {
            background-color: #ccc;
        }

        /* Hover effect para fondo blanco */
        .hamburguesa.fondo-blanco:hover span {
            background-color: #999;
        }

        /* Animación cuando el menú está activo - transformación a aspa (X) rotativa */
        .hamburguesa.activo {
            animation: rotateX 0.6s ease-in-out forwards;
        }

        .hamburguesa.activo span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .hamburguesa.activo span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }

        .hamburguesa.activo span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* Keyframes para la rotación del aspa */
        @keyframes rotateX {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(180deg);
            }
        }

        /* Animación de vuelta cuando se desactiva */
        .hamburguesa:not(.activo) {
            animation: rotateBack 0.6s ease-in-out forwards;
        }

        @keyframes rotateBack {
            0% {
                transform: rotate(180deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .menu-horizontal {
            position: fixed;
            top: 0px;
            right: 15px;
            /* Alineado con la hamburguesa */
            height: 50px;
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 37px 20px;
            background: rgba(0, 0, 0, 0);
            z-index: 2999;
            transform: translateX(100%);
            /* Ajustado para que salga completamente fuera */
            transition: transform 0.4s ease-in-out;
            border-bottom-left-radius: 10px;
            backdrop-filter: blur(4px);
            transform-origin: right center;
            /* Origen de transformación alineado a la derecha */
        }

        /* Menú horizontal cuando está activo */
        .menu-horizontal.activo {
            transform: translateX(0);
        }

        .menu-horizontal a {
            color: white;
            text-decoration: none;
            font-family: Avalon, Consolas, monospace;
            font-size: 1.1rem;
            white-space: nowrap;
            transition: color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        /* Keyframes para la rotación del aspa */
        @keyframes rotateX {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(180deg);
            }
        }

        /* Animación de vuelta cuando se desactiva */
        .hamburguesa:not(.activo) {
            animation: rotateBack 0.6s ease-in-out forwards;
        }

        @keyframes rotateBack {
            0% {
                transform: rotate(180deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .menu-horizontal {
            position: fixed;
            top: 0;
            right: 55px;
            height: 50px;
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 37px 20px;
            background: rgba(0, 0, 0, 0);
            z-index: 2999;
            transform: translateX(150%);
            transition: transform 0.4s ease-in-out;
            border-bottom-left-radius: 10px;
            backdrop-filter: blur(4px);
        }

        /* Menú horizontal cuando está activo */
        .menu-horizontal.activo {
            transform: translateX(0);
        }

        .menu-horizontal a {
            color: white;
            text-decoration: none;
            font-family: Avalon, Consolas, monospace;
            font-size: 1.1rem;
            white-space: nowrap;
            transition: color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        /* Específico para iOS */
        @supports (-webkit-touch-callout: none) {
            body {
                -webkit-user-select: none;
                user-select: none;
            }

            .item {
                -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
            }
        }

        /* Optimización para dispositivos móviles */
        @media (max-width: 768px) {
            .capa-blanca {
                padding: 20px;
            }

            .about-overlay {
                padding: 50px 30px;
            }

            .about-content {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Detectar iOS específicamente
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || isIOS;

            const capa = document.getElementById('capaBlanca');
            const texto = document.getElementById('capaTexto').querySelector('h2');
            const aboutOverlay = document.querySelector('.about-overlay');
            const botonesFiltro = document.querySelectorAll('.filtros button');
            const items = document.querySelectorAll('.mosaico .item');

            const initialTop = 1200;
            let maxScroll = 0;
            let targetScroll = 0;
            let currentScroll = 0;
            const ease = isIOS ? 0.05 : 0.1; // Suavizar más en iOS

            // Variables para el menú hamburguesa
            const hamburguesa = document.getElementById('hamburguesa');
            const menuHorizontal = document.getElementById('menuHorizontal');
            let scrollTimeout;
            let isScrolling = false;
            let lastScrollPosition = 0;

            // Variables para navegación suave
            let lastSectionUpdate = 0;

            // Función para navegar suavemente a una sección específica
            function scrollToSection(sectionId) {
                let targetPosition = 0;

                if (sectionId === 'works') {
                    // Ir a la capa blanca (sección works)
                    targetPosition = initialTop;
                } else if (sectionId === 'about') {
                    // Ir a la sección about
                    const aboutOffset = initialTop + capa.offsetHeight;
                    targetPosition = aboutOffset;
                }

                // Asegurar que no exceda los límites
                targetPosition = Math.min(Math.max(targetPosition, 0), maxScroll);

                // Actualizar el target scroll para animación suave
                targetScroll = targetPosition;
            }

            // Manejar navegación desde URL (para enlaces directos)
            function handleHashNavigation() {
                const hash = window.location.hash;
                if (hash) {
                    const sectionId = hash.substring(1);
                    // Pequeño delay para asegurar que la página esté completamente cargada
                    setTimeout(() => {
                        scrollToSection(sectionId);
                    }, 100);
                }
            }

            // Actualizar la URL mientras se hace scroll (para mejor UX)
            function updateURLHash() {
                const now = Date.now();
                // Throttle para no actualizar muy frecuentemente
                if (now - lastSectionUpdate < 500) return;

                const scrollRatio = currentScroll / maxScroll;
                let newHash = '';

                if (scrollRatio < 0.1) {
                    // Cerca del inicio - sin hash
                    newHash = '';
                } else if (scrollRatio < 0.7) {
                    // En la sección works
                    newHash = '#works';
                } else {
                    // En la sección about
                    newHash = '#about';
                }

                // Solo actualizar si cambió
                const currentHash = window.location.hash;
                if (currentHash !== newHash) {
                    // Usar replaceState para no agregar entradas al historial
                    const newURL = window.location.pathname + window.location.search + newHash;
                    history.replaceState(null, '', newURL);
                    lastSectionUpdate = now;
                }
            }

            function updateTextEffect(scroll) {
                const opacity = Math.max(0, 1 - (scroll / maxScroll));
                const translateY = -scroll * 0.1;

                if (texto.style.opacity !== opacity.toString()) {
                    texto.style.opacity = opacity;
                    texto.style.transform = `translateY(${translateY}px)`;
                }
            }

            function updateAboutOverlayPosition() {
                const aboutOffset = initialTop + capa.offsetHeight;
                const newTop = aboutOffset - currentScroll;

                // En móviles, asegurar que no se muestre debajo del contenido
                if (isMobile) {
                    const viewportHeight = window.innerHeight;
                    const documentHeight = document.documentElement.scrollHeight;

                    // Si estamos cerca del final del documento, ocultar el overlay
                    if (currentScroll + viewportHeight >= documentHeight - 50) {
                        aboutOverlay.style.display = 'none';
                        return;
                    } else {
                        aboutOverlay.style.display = 'block';
                    }
                }

                aboutOverlay.style.top = `${newTop}px`;
            }

            function updateMaxScroll() {
                const capaHeight = capa.offsetHeight;
                const aboutContent = document.querySelector('.about-content');
                const aboutBottom = aboutContent.offsetTop + aboutContent.offsetHeight;
                const totalScrollDistance = initialTop + capaHeight + aboutBottom;
                const viewportHeight = window.innerHeight;

                maxScroll = Math.max(0, totalScrollDistance - viewportHeight);

                // En móviles, ajustar el maxScroll para evitar espacios blancos
                if (isMobile) {
                    const documentHeight = document.documentElement.scrollHeight;
                    const bodyHeight = document.body.offsetHeight;
                    const realMaxScroll = Math.max(documentHeight, bodyHeight) - viewportHeight;

                    // Usar el menor de los dos para evitar over-scroll
                    maxScroll = Math.min(maxScroll, realMaxScroll);
                }

                if (targetScroll > maxScroll) {
                    targetScroll = maxScroll;
                }
            }

            // Función para detectar color de fondo y cambiar hamburguesa
            function updateHamburgerColor() {
                // Obtener el color de fondo del body o del elemento principal
                const bodyBg = window.getComputedStyle(document.body).backgroundColor;
                const capaRect = capa.getBoundingClientRect();

                // Si la capa blanca está visible en la pantalla (cerca del top)
                if (capaRect.top <= 100 && capaRect.bottom >= 0) {
                    hamburguesa.classList.add('fondo-blanco');
                } else {
                    hamburguesa.classList.remove('fondo-blanco');
                }
            }

            // Función para manejar la visibilidad del menú hamburguesa durante scroll
            function handleHamburgerVisibility() {
                const scrollDelta = Math.abs(currentScroll - lastScrollPosition);

                // Actualizar color de hamburguesa según el fondo
                updateHamburgerColor();

                // Si hay movimiento de scroll significativo
                if (scrollDelta > 5) {
                    if (!isScrolling) {
                        isScrolling = true;
                        // Ocultar menú y resetear hamburguesa durante scroll
                        if (menuHorizontal.classList.contains('activo')) {
                            hamburguesa.classList.remove('activo');
                            menuHorizontal.classList.remove('activo');
                        }
                        hamburguesa.style.opacity = '0'; // Desaparecer completamente
                        hamburguesa.style.pointerEvents = 'none';
                    }

                    // Limpiar timeout anterior
                    clearTimeout(scrollTimeout);

                    // Establecer nuevo timeout para cuando se detenga el scroll
                    scrollTimeout = setTimeout(() => {
                        isScrolling = false;
                        hamburguesa.style.opacity = '1'; // Aparecer completamente
                        hamburguesa.style.pointerEvents = 'auto';
                    }, 150); // Esperar 150ms después de que se detenga el scroll
                }

                lastScrollPosition = currentScroll;
            }

            let animationId;
            function smoothScroll() {
                if (Math.abs(targetScroll - currentScroll) > 0.1) {
                    currentScroll += (targetScroll - currentScroll) * ease;
                    currentScroll = Math.min(Math.max(currentScroll, 0), maxScroll);

                    const newTop = initialTop - currentScroll;
                    capa.style.top = `${newTop}px`;
                    updateTextEffect(currentScroll);
                    updateAboutOverlayPosition();
                    updateURLHash(); // Actualizar URL hash

                    // Manejar visibilidad de hamburguesa durante scroll
                    handleHamburgerVisibility();
                }

                animationId = requestAnimationFrame(smoothScroll);
            }

            function onWheel(e) {
                e.preventDefault();
                const delta = e.deltaY || e.detail || e.wheelDelta;
                targetScroll += delta;
                targetScroll = Math.min(Math.max(targetScroll, 0), maxScroll);
            }

            // Mejorar touch handling para iOS
            let touchStartY = 0;
            let touchStartTime = 0;
            let lastTouchY = 0;
            let velocity = 0;
            let isTouchScrolling = false;

            function handleTouchStart(e) {
                if (e.touches.length === 1) {
                    touchStartY = e.touches[0].clientY;
                    lastTouchY = touchStartY;
                    touchStartTime = Date.now();
                    velocity = 0;
                    isTouchScrolling = true;
                }
            }

            function handleTouchMove(e) {
                if (e.touches.length === 1 && isTouchScrolling) {
                    const touchY = e.touches[0].clientY;
                    const currentTime = Date.now();
                    const timeDelta = currentTime - touchStartTime;

                    if (timeDelta > 0) {
                        const delta = lastTouchY - touchY;
                        velocity = delta / timeDelta;

                        targetScroll += delta * 2; // Multiplicador para sensibilidad
                        targetScroll = Math.min(Math.max(targetScroll, 0), maxScroll);

                        lastTouchY = touchY;
                        touchStartTime = currentTime;

                        // Solo prevenir si realmente estamos scrollando nuestro contenido
                        if (targetScroll > 0 && targetScroll < maxScroll) {
                            e.preventDefault();
                        }
                    }
                }
            }

            function handleTouchEnd(e) {
                if (isTouchScrolling) {
                    // Aplicar momentum scrolling
                    if (Math.abs(velocity) > 0.5) {
                        targetScroll += velocity * 100;
                        targetScroll = Math.min(Math.max(targetScroll, 0), maxScroll);
                    }

                    // Asegurar que no sobrepase los límites en móviles
                    if (isMobile) {
                        targetScroll = Math.min(Math.max(targetScroll, 0), maxScroll);
                    }

                    isTouchScrolling = false;
                }
            }

            // Event listeners mejorados para iOS
            if (isMobile) {
                document.addEventListener('touchstart', handleTouchStart, { passive: true });
                document.addEventListener('touchmove', handleTouchMove, { passive: false });
                document.addEventListener('touchend', handleTouchEnd, { passive: true });

                // Ejecutar smooth scroll también en móviles
                smoothScroll();
            } else {
                window.addEventListener('wheel', onWheel, { passive: false });
                smoothScroll();
            }

            // Filtros
            botonesFiltro.forEach(boton => {
                boton.addEventListener('click', (e) => {
                    e.preventDefault();
                    const filtro = boton.getAttribute('data-filtro');

                    botonesFiltro.forEach(btn => btn.classList.remove('activo'));
                    boton.classList.add('activo');

                    items.forEach(item => {
                        const categoria = item.getAttribute('data-categoria');
                        if (filtro === 'todos' || categoria === filtro) {
                            item.classList.remove('hidden');
                        } else {
                            item.classList.add('hidden');
                        }
                    });

                    setTimeout(() => {
                        updateMaxScroll();
                    }, 100);
                });
            });

            // Modal logic mejorado para iOS - evitar disparo durante scroll
            const modal = document.getElementById('modal');
            const iframe = modal.querySelector('iframe');
            const modalTitle = document.getElementById('modalTitle');
            const modalDescription = document.getElementById('modalDescription');
            const closeBtn = modal.querySelector('.close-btn');

            items.forEach(item => {
                let touchStartPos = { x: 0, y: 0 };
                let touchMoved = false;
                let touchStartTimestamp = 0;

                const handleTouchStart = (e) => {
                    touchStartPos.x = e.touches[0].clientX;
                    touchStartPos.y = e.touches[0].clientY;
                    touchMoved = false;
                    touchStartTimestamp = Date.now();
                };

                const handleTouchMove = (e) => {
                    if (!touchMoved) {
                        const deltaX = Math.abs(e.touches[0].clientX - touchStartPos.x);
                        const deltaY = Math.abs(e.touches[0].clientY - touchStartPos.y);
                        // Si se movió más de 10px, considerarlo como scroll, no click
                        if (deltaX > 10 || deltaY > 10) {
                            touchMoved = true;
                        }
                    }
                };

                const openModal = (e) => {
                    // En móviles, verificar si fue un tap real o scroll
                    if (isMobile) {
                        const touchDuration = Date.now() - touchStartTimestamp;
                        // Si se movió durante el touch o duró más de 500ms, no abrir modal
                        if (touchMoved || touchDuration > 500) {
                            return;
                        }
                    }

                    e.preventDefault();
                    e.stopPropagation();

                    const videoURL = item.getAttribute('data-video');
                    const title = item.getAttribute('data-line1');
                    const description = item.getAttribute('data-line2');

                    iframe.src = videoURL + '?autoplay=1&title=0&byline=0&portrait=0';
                    modalTitle.textContent = title;
                    modalDescription.textContent = description;
                    modal.classList.add('active');
                    document.body.style.overflow = 'hidden';

                    // Cancelar animación de scroll mientras modal está abierto
                    if (animationId) {
                        cancelAnimationFrame(animationId);
                    }
                };

                // Event listeners diferentes para móvil y desktop
                if (isMobile) {
                    item.addEventListener('touchstart', handleTouchStart, { passive: true });
                    item.addEventListener('touchmove', handleTouchMove, { passive: true });
                    item.addEventListener('touchend', openModal, { passive: false });
                } else {
                    item.addEventListener('click', openModal);
                }
            });

            const closeModal = () => {
                modal.classList.remove('active');
                iframe.src = '';
                document.body.style.overflow = '';

                // Reanudar animación de scroll
                if (isMobile || !isMobile) {
                    smoothScroll();
                }
            };

            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });

            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    closeModal();
                }
            });

            // Hamburger menu con animación mejorada
            hamburguesa.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();

                // Solo permitir click si no está en modo scroll
                if (!isScrolling) {
                    hamburguesa.classList.toggle('activo');
                    menuHorizontal.classList.toggle('activo');
                }
            });

            // NAVEGACIÓN SUAVE - Manejar clicks en enlaces del menú
            const enlaces = document.querySelectorAll('.menu-horizontal a');
            enlaces.forEach(enlace => {
                enlace.addEventListener('click', function (e) {
                    const href = this.getAttribute('href');

                    // Solo procesar enlaces internos (que empiecen con #)
                    if (href && href.startsWith('#')) {
                        e.preventDefault();

                        const sectionId = href.substring(1); // Remover el #
                        scrollToSection(sectionId);

                        // Cerrar el menú después de navegar
                        hamburguesa.classList.remove('activo');
                        menuHorizontal.classList.remove('activo');
                    }
                });
            });

            // Cerrar menú al hacer clic fuera de él
            document.addEventListener('click', function (e) {
                if (!hamburguesa.contains(e.target) && !menuHorizontal.contains(e.target)) {
                    hamburguesa.classList.remove('activo');
                    menuHorizontal.classList.remove('activo');
                }
            });

            // Agregar estilos de transición a la hamburguesa para suavizar aparición/desaparición
            hamburguesa.style.transition = 'opacity 0.3s ease, transform 0.3s ease';

            // NAVEGACIÓN - Event listeners
            // Ejecutar al cargar la página
            handleHashNavigation();

            // Manejar cambios en el hash de la URL
            window.addEventListener('hashchange', handleHashNavigation);

            // Inicialización
            window.addEventListener('resize', () => {
                updateMaxScroll();
            });

            // Detectar cambios de color iniciales
            updateHamburgerColor();

            // También actualizar en resize por si cambia el layout
            window.addEventListener('resize', updateHamburgerColor);

            updateMaxScroll();
        });
    </script>
</body>

</html>
